name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Flutter version
        shell: bash
        run: flutter --version

      - name: Create lib/.env with dummy values
        shell: bash
        run: |
          mkdir -p lib
          cat > lib/.env <<EOF
          deezerClientId = 'dummy_deezer_client_id';
          deezerClientSecret = 'dummy_deezer_client_secret';
          lastFmApiKey = 'dummy_lastfm_api_key';
          lastFmApiSecret = 'dummy_lastfm_api_secret';
          EOF

      - name: Prepare Android release signing files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p android/app

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

          echo "Created android/key.properties"
          ls -lah android/app/release-keystore.jks
          sed 's/=.*/=***MASKED***/' android/key.properties

      - name: Get Flutter dependencies
        shell: bash
        run: flutter pub get

      - name: Build generated files in scrobblenaut
        shell: bash
        run: |
          cd scrobblenaut
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build generated files in root project
        shell: bash
        run: |
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build release APKs (split per ABI)
        shell: bash
        run: |
          set -eo pipefail
          flutter build apk --release --split-per-abi --verbose 2>&1 | tee flutter-build.log

      - name: Debug APK output paths
        if: always()
        shell: bash
        run: |
          echo "=== Listing build/app/outputs ==="
          find build/app/outputs -maxdepth 4 -type f | sort || true
          echo "=== Listing APKs only ==="
          find build -type f -name "*.apk" | sort || true

      - name: Collect APK artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p artifact-apks
          find build -type f -name "*.apk" -exec cp -v {} artifact-apks/ \; || true
          echo "=== Collected artifacts ==="
          ls -lah artifact-apks || true

      - name: Upload split APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: refreezer-split-apks
          path: artifact-apks/*.apk
          if-no-files-found: error

      - name: Upload Flutter build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: flutter-build-log
          path: flutter-build.log
          if-no-files-found: warn
