name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Flutter version
        run: flutter --version

      - name: Create lib/.env with dummy values
        run: |
          mkdir -p lib
          cat > lib/.env <<EOF
          deezerClientId = 'dummy_deezer_client_id';
          deezerClientSecret = 'dummy_deezer_client_secret';
          lastFmApiKey = 'dummy_lastfm_api_key';
          lastFmApiSecret = 'dummy_lastfm_api_secret';
          EOF

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build generated files in scrobblenaut
        run: |
          cd scrobblenaut
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build generated files in root project
        run: |
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi --verbose

      - name: Upload split APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: refreezer-split-apks
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
