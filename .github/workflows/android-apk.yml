name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Create lib/.env with dummy values
        run: |
          mkdir -p lib
          cat > lib/.env <<EOF
          deezerClientId = 'dummy_deezer_client_id';
          deezerClientSecret = 'dummy_deezer_client_secret';
          lastFmApiKey = 'dummy_lastfm_api_key';
          lastFmApiSecret = 'dummy_lastfm_api_secret';
          EOF

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build generated files in scrobblenaut
        run: |
          cd scrobblenaut
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build generated files in root project
        run: |
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: refreezer-debug-apk
          path: build/app/outputs/**/*.apk
