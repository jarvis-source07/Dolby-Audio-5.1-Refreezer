name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Flutter version
        shell: bash
        run: flutter --version

      - name: Create lib/.env with dummy values
        shell: bash
        run: |
          mkdir -p lib
          cat > lib/.env <<EOF
          deezerClientId = 'dummy_deezer_client_id';
          deezerClientSecret = 'dummy_deezer_client_secret';
          lastFmApiKey = 'dummy_lastfm_api_key';
          lastFmApiSecret = 'dummy_lastfm_api_secret';
          EOF

      - name: Prepare Android release signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          mkdir -p android/app

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is empty or missing"
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks

          if [ ! -s android/app/release-keystore.jks ]; then
            echo "Decoded keystore is empty"
            ls -lah android/app || true
            exit 1
          fi

          cat > android/key.properties <<EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=release-keystore.jks
          EOF

          echo "Created android/key.properties"
          ls -lah android/app/release-keystore.jks
          echo "Masked key.properties:"
          sed 's/=.*/=***MASKED***/' android/key.properties

      - name: Verify signing files
        shell: bash
        run: |
          echo "=== android directory ==="
          ls -lah android || true
          echo "=== android/app directory ==="
          ls -lah android/app || true
          echo "=== masked key.properties ==="
          sed 's/=.*/=***MASKED***/' android/key.properties || true

      - name: Verify keystore can be read
        shell: bash
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          keytool -list \
            -v \
            -keystore android/app/release-keystore.jks \
            -storetype JKS \
            -storepass "${ANDROID_STORE_PASSWORD}" \
            -alias "${ANDROID_KEY_ALIAS}"

      - name: Get Flutter dependencies
        shell: bash
        run: flutter pub get

      - name: Build generated files in scrobblenaut
        shell: bash
        run: |
          cd scrobblenaut
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build generated files in root project
        shell: bash
        run: |
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build release APKs (split per ABI)
        id: flutter_build
        continue-on-error: true
        shell: bash
        run: |
          set -eo pipefail
          flutter build apk --release --split-per-abi --verbose 2>&1 | tee flutter-build.log

      - name: Extract root-cause summary
        if: always()
        shell: bash
        run: |
          {
            echo "===== FIRST KEY ERROR MATCHES ====="
            grep -nE "FAILURE:|What went wrong|A problem occurred|Execution failed|Caused by:|error:|Exception|NullPointerException|SigningConfig|storeFile|keystore|No matching variant|is not an ABI|D8:" flutter-build.log \
              | grep -v "Tasks to be executed" \
              | head -n 120 || true
            echo

            LINE=$(grep -nE "What went wrong|A problem occurred|Execution failed|Caused by:|error:|Exception|NullPointerException|SigningConfig|storeFile|keystore|No matching variant|is not an ABI|D8:" flutter-build.log \
              | grep -v "Tasks to be executed" \
              | head -n 1 | cut -d: -f1 || true)

            if [ -n "$LINE" ]; then
              START=$((LINE-25))
              if [ "$START" -lt 1 ]; then START=1; fi
              END=$((LINE+80))
              echo "===== CONTEXT AROUND FIRST ROOT-CAUSE MATCH (lines $START-$END) ====="
              sed -n "${START},${END}p" flutter-build.log || true
            fi

            echo
            echo "===== LAST 120 LINES ====="
            tail -n 120 flutter-build.log || true

            echo
            echo "===== APK FILES FOUND ====="
            find build -type f -name "*.apk" | sort || true
          } | tee error-summary.txt

      - name: Run Gradle diagnostic build (only if Flutter build failed)
        if: steps.flutter_build.outcome == 'failure'
        shell: bash
        run: |
          set -eo pipefail
          cd android
          ./gradlew app:assembleRelease --stacktrace --info 2>&1 | tee ../gradle-release.log

      - name: Collect APK artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p artifact-apks
          find build -type f -name "*.apk" -exec cp -v {} artifact-apks/ \; || true
          echo "=== Collected APK artifacts ==="
          ls -lah artifact-apks || true

      - name: Upload split APK artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: refreezer-split-apks
          path: artifact-apks/*.apk
          if-no-files-found: warn

      - name: Upload Flutter build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: flutter-build-log
          path: flutter-build.log
          if-no-files-found: warn

      - name: Upload error summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: error-summary
          path: error-summary.txt
          if-no-files-found: warn

      - name: Upload Gradle diagnostic log
        if: steps.flutter_build.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: gradle-release-log
          path: gradle-release.log
          if-no-files-found: warn

      - name: Fail workflow if build failed
        if: steps.flutter_build.outcome == 'failure'
        shell: bash
        run: |
          echo "Flutter split APK build failed. Check artifacts: error-summary, flutter-build-log, gradle-release-log"
          exit 1
