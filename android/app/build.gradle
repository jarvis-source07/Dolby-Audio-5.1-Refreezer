plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace 'r.r.refreezer'
    compileSdk 35
    ndkVersion "27.0.12077973"

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "r.r.refreezer"
        minSdkVersion flutter.minSdkVersion
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // IMPORTANT:
        // Do NOT set abiFilters here when using:
        // flutter build apk --release --split-per-abi
    }

    signingConfigs {
        release {
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            shrinkResources false
            minifyEnabled false
        }

        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
            assets.srcDirs = ['src/main/assets']
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            pickFirsts += ['**/libc++_shared.so']
        }
        resources {
            excludes += [
                'META-INF/**',
                '**/kotlin/**'
            ]
        }
    }

    lint {
        disable 'InvalidPackage'
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    // Local FFmpeg Kit AAR
    implementation(name: "ffmpeg-kit-lts-ndk-r25-16k", ext: "aar")

    // Existing local AAR
    implementation files('libs/extension-flac.aar')
    
    implementation "com.google.android.exoplayer:exoplayer:2.19.1"
    

    implementation("androidx.activity:activity-ktx:1.10.1")

    implementation group: 'net.jthink', name: 'jaudiotagger', version: '2.2.5'
    implementation group: 'org.nanohttpd', name: 'nanohttpd', version: '2.3.1'

    implementation 'androidx.documentfile:documentfile:1.1.0'

    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}

flutter {
    source '../..'
}
